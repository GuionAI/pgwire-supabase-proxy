clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

when:
  - event: pull_request

steps:
  - name: check
    image: ghcr.io/tta-lab/moon-ci:latest
    commands:
      - |
        set -e
        moon setup
        export PATH="/root/.moon/bin:/root/.proto/bin:$$PATH"
        ARCH=$$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        curl -fsSL "https://github.com/dagger/dagger/releases/download/v0.19.11/dagger_v0.19.11_linux_$$ARCH.tar.gz" -o /tmp/dagger.tar.gz
        tar -xz -C /usr/local/bin/ dagger < /tmp/dagger.tar.gz
        moon ci :check
